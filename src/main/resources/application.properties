# Microservice Identifier
spring.application.name=project1

# Web Application Environment Configuration
spring.main.web-application-type=servlet

# Third-Party Gemini API Metadata Configurations
gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent

# App-level logging architecture configuration
logging.level.com.naveenmandal.project1=DEBUG

# Trace reactive HTTP packet allocations and payloads seamlessly
logging.level.org.springframework.web.reactive.function.client.ExchangeFunctions=TRACE

# Monitor root netty connection lifecycle setups for tracking network timeouts
logging.level.reactor.netty.http.client.HttpClient=DEBUG